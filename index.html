<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitación especial - 25 años de casados</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Georgia", serif;
        background: linear-gradient(135deg, #fff5f7, #f3ecff);
        color: #4a2a2a;
      }

      main {
        max-width: 720px;
        margin: 24px;
        padding: 32px;
        text-align: center;
        border-radius: 16px;
        background: #ffffffcc;
        box-shadow: 0 10px 25px rgba(74, 42, 42, 0.12);
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Invitación especial</h1>
      <p>Con mucha alegría celebramos los <strong>25 años de casados</strong> de nuestros padres.</p>
      <p>¡Nos encantará compartir este momento inolvidable contigo!</p>
    </main>
  </body>
</html>
